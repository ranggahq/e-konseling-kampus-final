<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-counseling</title>
    <script>
      (function() {
        // Safeguard and wrap WebSocket to prevent uncaught/unhandled connection errors in active dev servers
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          window.WebSocket = function(url, protocols) {
            console.warn("Attempting to connect WebSocket (monitored/secured):", url);
            let socket;
            try {
              socket = new OriginalWebSocket(url, protocols);
            } catch (err) {
              console.warn("WebSocket instantiation intercepted and caught:", err);
              // Fallback mockup to prevent client crash
              socket = {
                readyState: OriginalWebSocket.CLOSED,
                close: function() {},
                send: function() {},
                addEventListener: function() {},
                removeEventListener: function() {},
                dispatchEvent: function() { return false; },
                onopen: null,
                onclose: null,
                onerror: null,
                onmessage: null
              };
            }

            // Secure proxy to ensure custom onopen, onclose, onerror, and onmessage handlers do not crash
            const safeSocket = new Proxy(socket, {
              get(target, prop) {
                try {
                  // Do NOT pass receiver here to avoid "Illegal invocation" on native getters/properties (e.g. readyState)
                  const val = Reflect.get(target, prop);
                  if (typeof val === 'function') {
                    return val.bind(target);
                  }
                  return val;
                } catch (e) {
                  // Fallback for native properties/methods query
                  const val = target[prop];
                  if (typeof val === 'function') {
                    return val.bind(target);
                  }
                  return val;
                }
              },
              set(target, prop, value) {
                try {
                  if (['onopen', 'onclose', 'onerror', 'onmessage'].includes(prop)) {
                    const origHandler = value;
                    const safeHandler = function(event) {
                      try {
                        if (origHandler) origHandler.call(this, event);
                      } catch (err) {
                        console.warn(`WebSocket caught exception in "${String(prop)}" handler:`, err);
                      }
                    };
                    target[prop] = safeHandler;
                    return true;
                  }
                  target[prop] = value;
                  return true;
                } catch (e) {
                  try {
                    return Reflect.set(target, prop, value);
                  } catch (err) {
                    return false;
                  }
                }
              }
            });

            // Initialize default listener hooks
            try {
              safeSocket.onopen = function() {};
              safeSocket.onclose = function() {};
              safeSocket.onerror = function() {};
              safeSocket.onmessage = function() {};
            } catch (e) {}

            // Attach silent event listeners to absorb socket errors
            if (typeof socket.addEventListener === 'function') {
              try {
                socket.addEventListener('error', function(e) {
                  console.warn("Benign development WebSocket connection failure intercepted safely:", e);
                });
                socket.addEventListener('close', function(e) {
                  console.warn("Benign development WebSocket connection close event intercepted:", e);
                });
              } catch (e) {}
            }

            return safeSocket;
          };

          // Mimic original WebSocket constants
          Object.assign(window.WebSocket, OriginalWebSocket);
          window.WebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
          window.WebSocket.OPEN = OriginalWebSocket.OPEN;
          window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
          window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
        }

        // Catch global Vite or WebSocket connection exceptions to prevent red console screens
        window.addEventListener('error', function(event) {
          if (event && event.message && (
            event.message.indexOf('WebSocket') !== -1 ||
            event.message.indexOf('webSocket') !== -1 ||
            event.message.indexOf('vite') !== -1
          )) {
            console.warn("Intercepted and suppressed global WebSocket/HMR exception:", event.message);
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        // Catch unhandled promise rejections originating from Vite HMR/dev-server socket failures
        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason;
          if (reason) {
            const msg = String(reason.message || reason);
            if (
              msg.indexOf('WebSocket') !== -1 ||
              msg.indexOf('webSocket') !== -1 ||
              msg.indexOf('vite') !== -1 ||
              msg.indexOf('closed without opened') !== -1
            ) {
              console.warn("Intercepted and suppressed global HMR Unhandled Promise Rejection:", msg);
              event.preventDefault();
              event.stopPropagation();
            }
          }
        }, true);

        // Re-route console errors about web sockets, failed connections, and closed-without-opened info to warm console warnings
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const combinedMsg = args.join(' ');
          if (
            combinedMsg.indexOf('WebSocket') !== -1 ||
            combinedMsg.indexOf('failed to connect') !== -1 ||
            combinedMsg.indexOf('closed without opened') !== -1
          ) {
            console.warn("[Interception Controller - Redirected Error to Warning]:", ...args);
            return;
          }
          return originalConsoleError.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
